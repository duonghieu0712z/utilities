name: Code Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  checks: write
  contents: read

jobs:
  commit-message:
    name: Commit message
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint latest commit message
        if: github.event_name == 'push'
        run: pnpm commitlint --from ${{ github.event.before }} --to ${{ github.sha }} --verbose

      - name: Lint PR commit messages
        if: github.event_name == 'pull_request'
        run: pnpm commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format

      - name: Check oxlint
        run: pnpm lint:check:oxlint --format=github

      - name: Check ESLint
        uses: reviewdog/action-eslint@v1
        with:
          reporter: ${{ github.event_name == 'pull_request' && 'github-pr-check' || 'github-check' }}
          filter_mode: ${{ github.event_name == 'pull_request' && 'added' || 'nofilter' }}
          fail_level: error
          eslint_flags: '. --cache'

      - name: Check types
        run: pnpm type-check

  tauri-quality:
    name: Tauri quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Check formatting
        working-directory: src-tauri
        run: cargo +nightly fmt -- --check

      - name: Check Clippy
        working-directory: src-tauri
        run: cargo +nightly clippy --all-targets --all-features -- -D warnings
